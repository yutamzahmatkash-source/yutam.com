<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of Duty Store</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}
header {
    background: black;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}
.hero {
    padding: 80px 20px;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
button:hover {
    background: darkred;
}
.section {
    padding: 50px 20px;
}
.card {
    background: #1c1c1c;
    padding: 20px;
    margin: 20px auto;
    width: 250px;
    border-radius: 10px;
}
footer {
    background: black;
    padding: 20px;
    margin-top: 50px;
}
</style>
</head>
<body>

<header>
🔥 Call of Duty Store
</header>

<div class="hero">
    <h1>به فروشگاه حرفه‌ای کالاف خوش آمدید</h1>
    <p>خرید CP و آیتم‌های ویژه</p>
    <button>خرید الآن</button>
</div>

<div class="section">
    <h2>پکیج‌ها</h2>

    <div class="card">
        <h3>پکیج 1000 CP</h3>
        <p>قیمت: 200 هزار تومان</p>
        <button>خرید</button>
    </div>

    <div class="card">
        <h3>پکیج 5000 CP</h3>
        <p>قیمت: 900 هزار تومان</p>
        <button>خرید</button>
    </div>
</div>

<footer>
© 2026 Call of Duty Store
</footer>

</body>
</html>
